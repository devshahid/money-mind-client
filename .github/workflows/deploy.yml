name: Release Frontend

on:
  push:
    branches:
      - deploy

run-name: '${{ github.event.head_commit.message }}'

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  release:
    name: Semantic Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-and-deploy:
    name: Build & Deploy to Production
    needs: [test, release]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with production API URL
        run: npx vite build
        env:
          VITE_API_BASE_URL: https://tocxch0cd7.execute-api.ap-south-1.amazonaws.com/prod/api/v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Get infrastructure config from SSM
        id: infra
        run: |
          BUCKET=$(aws ssm get-parameter --name "/money-mind/prod/frontend/BucketName" --query "Parameter.Value" --output text)
          DIST_ID=$(aws ssm get-parameter --name "/money-mind/prod/frontend/DistributionId" --query "Parameter.Value" --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Clear S3 bucket
        run: aws s3 rm s3://${{ steps.infra.outputs.bucket }} --recursive

      - name: Upload assets with long cache (1 year)
        run: |
          aws s3 cp dist/ s3://${{ steps.infra.outputs.bucket }} --recursive \
            --cache-control "max-age=31536000" \
            --exclude "index.html"

      - name: Upload index.html with no cache
        run: |
          aws s3 cp dist/index.html s3://${{ steps.infra.outputs.bucket }}/index.html \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.infra.outputs.distribution_id }} \
            --paths "/*"

      - name: Deployment complete
        run: |
          CF_DOMAIN=$(aws ssm get-parameter --name "/money-mind/prod/frontend/CloudFrontDomain" --query "Parameter.Value" --output text)
          echo "✅ Deployed to: https://$CF_DOMAIN"
